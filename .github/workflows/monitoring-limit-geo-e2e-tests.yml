name: Synthetic Geo Monitoring Frontend tests

on:
  workflow_dispatch:
  schedule:
    - cron: "1 * * * *"

permissions:
  actions: write
  contents: read
  deployments: write

jobs:
  # -------------------------------------------------------------------------
  # Preflight balance jobs — one per region (US / EU / SG).
  #
  # These run ONCE per cron tick per region instead of being repeated inside
  # every swap/trade/limit job. They:
  #   - check the monitoring wallet's balance,
  #   - send AT MOST one Slack alert if low,
  #   - export `outcome` (pass | warn | fail | error) so the test jobs can
  #     skip themselves when the wallet is critically low.
  #
  # Before this refactor each of fe-swap-*, fe-trade-*, fe-limit-* ran the
  # same five balance steps independently, producing up to 9 Slack alerts
  # and up to 3 topup-workflow dispatches per cron tick.
  #
  # Topup dispatch is NOT done per-preflight anymore (Phase A / MTN-97). The
  # three preflights run in parallel and each used to hit `gh run list` in the
  # same second, so all three saw "nothing in flight" and dispatched — 3 full
  # top-ups per tick for work that a single run already covers (one topup run
  # refills US/EU/SG/preview). Dispatch is now centralised in the single
  # `topup-dispatch` job below, which `needs` all three preflights.
  # -------------------------------------------------------------------------

  preflight-us:
    name: preflight-us-balance
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    outputs:
      outcome: ${{ steps.balance-details.outputs.outcome }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install dependencies
        run: yarn --cwd packages/e2e install --frozen-lockfile
      - name: Check account balances
        id: balance-check
        continue-on-error: true
        env:
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_US }}
          ACCOUNT_LABEL: "Monitoring US"
        run: yarn --cwd packages/e2e check-balances
      - name: Extract balance details
        id: balance-details
        continue-on-error: true
        run: |
          if [ -f packages/e2e/balance-report.json ]; then
            OUTCOME=$(jq -r '.outcome // "warn"' packages/e2e/balance-report.json)
            echo "outcome=$OUTCOME" >> "$GITHUB_OUTPUT"
            if [ "$OUTCOME" = "warn" ] || [ "$OUTCOME" = "fail" ]; then
              SUMMARY=$(jq -r '[.details[] | ltrimstr("  ")] | join("\\n")' packages/e2e/balance-report.json)
              ADDRESS=$(jq -r '.address // ""' packages/e2e/balance-report.json)
              echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"
              echo "address=${ADDRESS}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "outcome=error" >> "$GITHUB_OUTPUT"
          fi
      - name: Send low-balance Slack alert
        if: steps.balance-details.outputs.outcome == 'warn' || steps.balance-details.outputs.outcome == 'fail'
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ steps.balance-details.outputs.outcome == 'fail' && '🚨 E2E Critical Balance Alert' || '⚠️ E2E Low Balance Warning' }}",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "${{ steps.balance-details.outputs.outcome == 'fail' && '🚨 E2E Critical Balance Alert' || '⚠️ E2E Low Balance Warning' }}", "emoji": true }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Account:* Monitoring US\n*Address:* ${{ steps.balance-details.outputs.address }}\n*Shortages:*\n${{ steps.balance-details.outputs.summary }}\n*Workflow:* monitoring-limit-geo / preflight-us\n*Details:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.E2E_SLACK_WEBHOOK_BALANCE_ALERTS }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  preflight-eu:
    name: preflight-eu-balance
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    outputs:
      outcome: ${{ steps.balance-details.outputs.outcome }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install dependencies
        run: yarn --cwd packages/e2e install --frozen-lockfile
      - name: Check account balances
        id: balance-check
        continue-on-error: true
        env:
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_EU }}
          ACCOUNT_LABEL: "Monitoring EU"
        run: yarn --cwd packages/e2e check-balances
      - name: Extract balance details
        id: balance-details
        continue-on-error: true
        run: |
          if [ -f packages/e2e/balance-report.json ]; then
            OUTCOME=$(jq -r '.outcome // "warn"' packages/e2e/balance-report.json)
            echo "outcome=$OUTCOME" >> "$GITHUB_OUTPUT"
            if [ "$OUTCOME" = "warn" ] || [ "$OUTCOME" = "fail" ]; then
              SUMMARY=$(jq -r '[.details[] | ltrimstr("  ")] | join("\\n")' packages/e2e/balance-report.json)
              ADDRESS=$(jq -r '.address // ""' packages/e2e/balance-report.json)
              echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"
              echo "address=${ADDRESS}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "outcome=error" >> "$GITHUB_OUTPUT"
          fi
      - name: Send low-balance Slack alert
        if: steps.balance-details.outputs.outcome == 'warn' || steps.balance-details.outputs.outcome == 'fail'
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ steps.balance-details.outputs.outcome == 'fail' && '🚨 E2E Critical Balance Alert' || '⚠️ E2E Low Balance Warning' }}",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "${{ steps.balance-details.outputs.outcome == 'fail' && '🚨 E2E Critical Balance Alert' || '⚠️ E2E Low Balance Warning' }}", "emoji": true }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Account:* Monitoring EU\n*Address:* ${{ steps.balance-details.outputs.address }}\n*Shortages:*\n${{ steps.balance-details.outputs.summary }}\n*Workflow:* monitoring-limit-geo / preflight-eu\n*Details:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.E2E_SLACK_WEBHOOK_BALANCE_ALERTS }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  preflight-sg:
    name: preflight-sg-balance
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    outputs:
      outcome: ${{ steps.balance-details.outputs.outcome }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install dependencies
        run: yarn --cwd packages/e2e install --frozen-lockfile
      - name: Check account balances
        id: balance-check
        continue-on-error: true
        env:
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_SG }}
          ACCOUNT_LABEL: "Monitoring SG"
        run: yarn --cwd packages/e2e check-balances
      - name: Extract balance details
        id: balance-details
        continue-on-error: true
        run: |
          if [ -f packages/e2e/balance-report.json ]; then
            OUTCOME=$(jq -r '.outcome // "warn"' packages/e2e/balance-report.json)
            echo "outcome=$OUTCOME" >> "$GITHUB_OUTPUT"
            if [ "$OUTCOME" = "warn" ] || [ "$OUTCOME" = "fail" ]; then
              SUMMARY=$(jq -r '[.details[] | ltrimstr("  ")] | join("\\n")' packages/e2e/balance-report.json)
              ADDRESS=$(jq -r '.address // ""' packages/e2e/balance-report.json)
              echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"
              echo "address=${ADDRESS}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "outcome=error" >> "$GITHUB_OUTPUT"
          fi
      - name: Send low-balance Slack alert
        if: steps.balance-details.outputs.outcome == 'warn' || steps.balance-details.outputs.outcome == 'fail'
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ steps.balance-details.outputs.outcome == 'fail' && '🚨 E2E Critical Balance Alert' || '⚠️ E2E Low Balance Warning' }}",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "${{ steps.balance-details.outputs.outcome == 'fail' && '🚨 E2E Critical Balance Alert' || '⚠️ E2E Low Balance Warning' }}", "emoji": true }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Account:* Monitoring SG\n*Address:* ${{ steps.balance-details.outputs.address }}\n*Shortages:*\n${{ steps.balance-details.outputs.summary }}\n*Workflow:* monitoring-limit-geo / preflight-sg\n*Details:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.E2E_SLACK_WEBHOOK_BALANCE_ALERTS }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # -------------------------------------------------------------------------
  # Single, deduplicated topup dispatcher (Phase A / MTN-97).
  #
  # `needs` all three preflights and dispatches AT MOST ONE topup per cron tick
  # if any region reports a low balance (warn/fail). One topup run refills every
  # account (US/EU/SG/preview), so a single dispatch covers all regions.
  #
  # Dedup model:
  #   - Consolidation (this single job) removes the same-tick 3x race: the three
  #     preflights used to each dispatch in parallel.
  #   - The cooldown guard below removes cross-tick / cross-workflow repeats
  #     (this job + prod-frontend-e2e all check the same workflow's recent runs).
  # The per-region Slack alerts stay in each preflight, so a persistently low
  # account still pages every tick even while dispatch is on cooldown.
  # -------------------------------------------------------------------------
  topup-dispatch:
    name: topup-dispatch
    runs-on: ubuntu-latest
    needs: [preflight-us, preflight-eu, preflight-sg]
    if: >-
      always() && (
        needs.preflight-us.outputs.outcome == 'warn' || needs.preflight-us.outputs.outcome == 'fail' ||
        needs.preflight-eu.outputs.outcome == 'warn' || needs.preflight-eu.outputs.outcome == 'fail' ||
        needs.preflight-sg.outputs.outcome == 'warn' || needs.preflight-sg.outputs.outcome == 'fail'
      )
    permissions:
      actions: write
      contents: read
    steps:
      - name: Trigger automatic topup (deduplicated)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          US_OUTCOME: ${{ needs.preflight-us.outputs.outcome }}
          EU_OUTCOME: ${{ needs.preflight-eu.outputs.outcome }}
          SG_OUTCOME: ${{ needs.preflight-sg.outputs.outcome }}
        run: |
          # Dedup guard (Phase A / MTN-97): skip if a topup is already in flight,
          # OR a real (non-dry-run) successful topup was *created* (`createdAt`,
          # i.e. dispatched/queued) within the ~45 min cooldown. The window is
          # keyed off createdAt (≈ dispatch time), not completion time, since the
          # intent is to rate-limit how often we dispatch. 45 min is deliberately
          # below the 60 min cron so a still-low account is still refilled on the
          # next hourly tick; the window only collapses same-tick and
          # cross-workflow bursts. Failed runs do NOT count (so a bad topup can be
          # retried immediately); dry runs do NOT count (they move no funds).
          # Best-effort, non-atomic: two dispatchers firing at the same instant
          # can still both dispatch.
          COOLDOWN_SECONDS=2700
          RECENT=$(gh run list --workflow "E2E: Topup Test Accounts" --limit 50 \
            --json status,conclusion,displayTitle,createdAt \
            --jq "[.[]
              | select((.displayTitle | startswith(\"Dry run\")) | not)
              | select(
                  .status == \"queued\" or .status == \"in_progress\"
                  or (.conclusion == \"success\" and ((now - (.createdAt | fromdateiso8601)) < $COOLDOWN_SECONDS))
                )] | length" || echo "")
          # Fail open (MTN-110): if the gh/jq lookup errored, RECENT is
          # empty/non-numeric — treat it as "nothing recent" and dispatch
          # rather than silently skip. A duplicate topup is harmless (the
          # script re-checks balances and only sends deficits); a skipped
          # dispatch is the starvation bug this guard exists to prevent.
          if ! [[ "$RECENT" =~ ^[0-9]+$ ]]; then
            echo "Topup cooldown lookup failed (gh/jq) — proceeding to dispatch."
            RECENT=0
          fi
          if [ "$RECENT" -gt 0 ]; then
            echo "Recent successful or in-flight topup within cooldown — skipping dispatch."
          else
            gh workflow run "E2E: Topup Test Accounts" \
              --ref stage \
              -f dry_run=false \
              -f topup_multiplier=3.0 \
              -f reserve_osmo=5 \
              -f reserve_usdc=100
            echo "Topup workflow dispatched (US=$US_OUTCOME EU=$EU_OUTCOME SG=$SG_OUTCOME)."
          fi

  # -------------------------------------------------------------------------
  # Region test jobs.
  #
  # Each `needs:` its region's preflight and skips when preflight reports
  # a critical (`fail`) balance shortage. Per-job balance checks have moved
  # to the preflight; these jobs only run the playwright tests.
  # -------------------------------------------------------------------------

  fe-swap-us:
    timeout-minutes: 10
    name: prod-fe-swap-us
    runs-on: macos-14
    needs: preflight-us
    if: needs.preflight-us.outputs.outcome != 'fail'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-22.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-22.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Run Swap tests in US
        env:
          BASE_URL: "https://app.osmosis.zone"
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_US }}
          # Linux-headless mode (PR #4319) — disabled in favour of macos-14 above due to
          # Keplr extension popup flakiness in headless Chromium on Linux. To retry the
          # cheaper Linux runner, switch `runs-on:` to `ubuntu-latest` and uncomment:
          # HEADLESS: "true"
        run: |
          cd packages/e2e
          npx playwright test monitoring.swap
      - name: upload test results
        if: failure()
        id: e2e-test-results
        uses: actions/upload-artifact@v4
        with:
          name: us-swap-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report

  fe-swap-eu:
    timeout-minutes: 15
    name: prod-fe-swap-eu
    runs-on: macos-14
    needs: preflight-eu
    if: needs.preflight-eu.outputs.outcome != 'fail'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-22.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-22.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Run Swap tests in EU
        env:
          BASE_URL: "https://app.osmosis.zone"
          TEST_PROXY: "http://138.68.112.16:8888"
          TEST_PROXY_USERNAME: ${{ secrets.TEST_PROXY_USERNAME }}
          TEST_PROXY_PASSWORD: ${{ secrets.TEST_PROXY_PASSWORD }}
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_EU }}
          USE_TEST_PROXY: "use"
          # Linux-headless mode (PR #4319) — disabled in favour of macos-14 above due to
          # Keplr extension popup flakiness in headless Chromium on Linux. To retry the
          # cheaper Linux runner, switch `runs-on:` to `ubuntu-latest` and uncomment:
          # HEADLESS: "true"
        run: |
          cd packages/e2e
          npx playwright test monitoring.swap
      - name: upload test results
        if: failure()
        id: e2e-test-results
        uses: actions/upload-artifact@v4
        with:
          name: eu-swap-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report

  fe-swap-sg:
    timeout-minutes: 15
    name: prod-fe-swap-sg
    runs-on: macos-14
    needs: preflight-sg
    if: needs.preflight-sg.outputs.outcome != 'fail'
    steps:
      - name: Echo IP
        run: curl -L "https://ipinfo.io" -s
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-22.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-22.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Run Swap tests in SG
        env:
          BASE_URL: "https://app.osmosis.zone"
          TEST_PROXY: "http://139.59.218.19:8888"
          TEST_PROXY_USERNAME: ${{ secrets.TEST_PROXY_USERNAME }}
          TEST_PROXY_PASSWORD: ${{ secrets.TEST_PROXY_PASSWORD }}
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_SG }}
          USE_TEST_PROXY: "use"
          # Linux-headless mode (PR #4319) — disabled in favour of macos-14 above due to
          # Keplr extension popup flakiness in headless Chromium on Linux. To retry the
          # cheaper Linux runner, switch `runs-on:` to `ubuntu-latest` and uncomment:
          # HEADLESS: "true"
        run: |
          cd packages/e2e
          npx playwright test monitoring.swap
      - name: upload test results
        if: failure()
        id: e2e-test-results
        uses: actions/upload-artifact@v4
        with:
          name: sg-swap-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report

  fe-trade-us:
    timeout-minutes: 10
    needs: [preflight-us, fe-swap-us]
    if: always() && needs.preflight-us.outputs.outcome != 'fail'
    name: prod-fe-trade-us
    runs-on: macos-14
    outputs:
      unexpected: ${{ steps.set-output.outputs.unexpected }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-22.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-22.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Run Trade tests in US
        id: run-us
        env:
          BASE_URL: "https://app.osmosis.zone"
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_US }}
          # Linux-headless mode (PR #4319) — disabled in favour of macos-14 above due to
          # Keplr extension popup flakiness in headless Chromium on Linux. To retry the
          # cheaper Linux runner, switch `runs-on:` to `ubuntu-latest` and uncomment:
          # HEADLESS: "true"
        run: |
          cd packages/e2e
          npx playwright test monitoring.market --timeout 90000
      - name: set-output
        if: always()
        id: set-output
        run: echo "unexpected=$(jq -r '.stats.unexpected' packages/e2e/playwright-report/test-results.json)" >> $GITHUB_OUTPUT
      - name: upload monitoring test results
        if: failure() || cancelled()
        id: monitoring-test-results
        uses: actions/upload-artifact@v4
        with:
          name: us-trade-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report

  fe-limit-us:
    timeout-minutes: 15
    needs: [preflight-us, fe-trade-us]
    if: always() && needs.preflight-us.outputs.outcome != 'fail'
    name: prod-fe-limit-us
    runs-on: macos-14
    outputs:
      unexpected: ${{ steps.set-output.outputs.unexpected }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-22.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-22.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Cancel leftover open orders
        continue-on-error: true
        env:
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_US }}
          ACCOUNT_LABEL: "Monitoring US (pre-test cleanup)"
        run: npx tsx packages/e2e/scripts/cancel-all-orders.ts
      - name: Run Limit tests in US
        id: run-us
        env:
          BASE_URL: "https://app.osmosis.zone"
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_US }}
          # Linux-headless mode (PR #4319) — disabled in favour of macos-14 above due to
          # Keplr extension popup flakiness in headless Chromium on Linux. To retry the
          # cheaper Linux runner, switch `runs-on:` to `ubuntu-latest` and uncomment:
          # HEADLESS: "true"
        run: |
          cd packages/e2e
          npx playwright test monitoring.limit --timeout 180000
      - name: set-output
        if: always()
        id: set-output
        run: |
          echo "unexpected=$(jq -r '.stats.unexpected' packages/e2e/playwright-report/test-results.json)"
          echo "unexpected=$(jq -r '.stats.unexpected' packages/e2e/playwright-report/test-results.json)" >> $GITHUB_OUTPUT
      - name: upload monitoring test results
        if: failure() || cancelled()
        id: monitoring-test-results
        uses: actions/upload-artifact@v4
        with:
          name: us-limit-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report

  fe-bot-alert:
    runs-on: ubuntu-latest
    needs: [fe-trade-us, fe-limit-us]
    if: failure() && github.run_attempt == 2 && (needs.fe-trade-us.outputs.unexpected > 1 || needs.fe-limit-us.outputs.unexpected > 1)
    # Send alert only if something failed and unexpected failures are more than 1
    steps:
      - name: Install Datadog CI
        run: |
          echo "📦 Installing Datadog CI..."
          curl -L --fail "https://github.com/DataDog/datadog-ci/releases/download/v4.1.2/datadog-ci_linux-x64" --output "/usr/local/bin/datadog-ci"
          chmod +x /usr/local/bin/datadog-ci
          echo "✅ Datadog CI installed"

      - name: Verify Datadog CI Installation
        run: |
          echo "🔍 Verifying Datadog CI installation..."
          datadog-ci version
          echo "✅ Datadog CI is ready to use"

      - name: Send Datadog alert if test fails
        env:
          DD_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DD_APP_KEY: ${{ secrets.DATADOG_APPLICATION_KEY }}
          DD_SITE: ${{ secrets.DATADOG_SITE }}
        run: |
          echo "🔍 Sending critical failure metrics to Datadog..."

          # Add custom tag to mark this as a critical failure (2nd attempt with multiple failures)
          datadog-ci tag --level pipeline --tags "critical_failure:true" --tags "dd_gh_run_attempt:${{ github.run_attempt }}"

          # Add tags for unexpected failure counts by region
          datadog-ci tag --level pipeline \
            --tags "fe_trade_us_unexpected:${{ needs.fe-trade-us.outputs.unexpected }}" \
            --tags "fe_limit_us_unexpected:${{ needs.fe-limit-us.outputs.unexpected }}"

          echo "✅ Metrics sent to Datadog successfully"

  delete-deployments:
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        fe-swap-us,
        fe-swap-eu,
        fe-swap-sg,
        fe-trade-us,
        fe-limit-us,
        fe-bot-alert,
      ]
    steps:
      - name: Delete Previous deployments
        uses: actions/github-script@v7
        with:
          debug: true
          script: |
            const deployments = await github.rest.repos.listDeployments({
               owner: context.repo.owner,
               repo: context.repo.repo,
               sha: context.sha
             });
             await Promise.all(
               deployments.data.map(async (deployment) => {
                 await github.rest.repos.createDeploymentStatus({ 
                   owner: context.repo.owner, 
                   repo: context.repo.repo, 
                   deployment_id: deployment.id, 
                   state: 'inactive' 
                 });
                 return github.rest.repos.deleteDeployment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id
                });
               })
             );
