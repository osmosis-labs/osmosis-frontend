        run: |
          cd packages/e2e
          npx playwright test monitoring.limit --timeout 180000
      - name: set-output
        if: always()
        id: set-output
        run: echo "unexpected=$(jq -r '.stats.unexpected' packages/e2e/playwright-report/test-results.json)" >> $GITHUB_OUTPUT
      - name: upload monitoring test results
        if: failure() || cancelled()
        id: monitoring-test-results
        uses: actions/upload-artifact@v4
        with:
          name: eu-limit-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report

  fe-trade-sg:
    timeout-minutes: 15
    needs: [preflight-sg, fe-swap-sg]
    if: always() && needs.preflight-sg.outputs.outcome != 'fail'
    name: prod-fe-trade-sg
    runs-on: macos-14
    outputs:
      unexpected: ${{ steps.set-output.outputs.unexpected }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-22.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-22.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Run Trade tests in SG
        env:
          BASE_URL: "https://app.osmosis.zone"
          TEST_PROXY: "http://139.59.218.19:8888"
          TEST_PROXY_USERNAME: ${{ secrets.TEST_PROXY_USERNAME }}
          TEST_PROXY_PASSWORD: ${{ secrets.TEST_PROXY_PASSWORD }}
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_SG }}
          USE_TEST_PROXY: "use"
          # Linux-headless mode (PR #4319) — disabled in favour of macos-14 above due to
          # Keplr extension popup flakiness in headless Chromium on Linux. To retry the
          # cheaper Linux runner, switch `runs-on:` to `ubuntu-latest` and uncomment:
          # HEADLESS: "true"
        run: |
          cd packages/e2e
          npx playwright test monitoring.market --timeout 90000
      - name: set-output
        if: always()
        id: set-output
        run: echo "unexpected=$(jq -r '.stats.unexpected' packages/e2e/playwright-report/test-results.json)" >> $GITHUB_OUTPUT
      - name: upload monitoring test results
        if: failure() || cancelled()
        id: monitoring-test-results
        uses: actions/upload-artifact@v4
        with:
          name: sg-trade-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report

  fe-trade-us:
    timeout-minutes: 10
    needs: [preflight-us, fe-swap-us]
    if: always() && needs.preflight-us.outputs.outcome != 'fail'
    name: prod-fe-trade-us
    runs-on: macos-14
    outputs:
      unexpected: ${{ steps.set-output.outputs.unexpected }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-22.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-22.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Run Trade tests in US
        id: run-us
        env:
          BASE_URL: "https://app.osmosis.zone"
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_US }}
          # Linux-headless mode (PR #4319) — disabled in favour of macos-14 above due to
          # Keplr extension popup flakiness in headless Chromium on Linux. To retry the
          # cheaper Linux runner, switch `runs-on:` to `ubuntu-latest` and uncomment:
          # HEADLESS: "true"
        run: |
          cd packages/e2e
          npx playwright test monitoring.market --timeout 90000
      - name: set-output
        if: always()
        id: set-output
        run: echo "unexpected=$(jq -r '.stats.unexpected' packages/e2e/playwright-report/test-results.json)" >> $GITHUB_OUTPUT
      - name: upload monitoring test results
        if: failure() || cancelled()
        id: monitoring-test-results
        uses: actions/upload-artifact@v4
        with:
          name: us-trade-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report

  fe-limit-us:
    timeout-minutes: 15
    needs: [preflight-us, fe-trade-us]
    if: always() && needs.preflight-us.outputs.outcome != 'fail'
    name: prod-fe-limit-us
    runs-on: macos-14
    outputs:
      unexpected: ${{ steps.set-output.outputs.unexpected }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-22.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-22.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Cancel leftover open orders
        continue-on-error: true
        env:
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_US }}
          ACCOUNT_LABEL: "Monitoring US (pre-test cleanup)"
        run: npx tsx packages/e2e/scripts/cancel-all-orders.ts
      - name: Run Limit tests in US
        id: run-us
        env:
          BASE_URL: "https://app.osmosis.zone"
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_US }}
          # Linux-headless mode (PR #4319) — disabled in favour of macos-14 above due to
          # Keplr extension popup flakiness in headless Chromium on Linux. To retry the
          # cheaper Linux runner, switch `runs-on:` to `ubuntu-latest` and uncomment:
          # HEADLESS: "true"
        run: |
          cd packages/e2e
          npx playwright test monitoring.limit --timeout 180000
      - name: set-output
        if: always()
        id: set-output
        run: |
          echo "unexpected=$(jq -r '.stats.unexpected' packages/e2e/playwright-report/test-results.json)"
          echo "unexpected=$(jq -r '.stats.unexpected' packages/e2e/playwright-report/test-results.json)" >> $GITHUB_OUTPUT
      - name: upload monitoring test results
        if: failure() || cancelled()
        id: monitoring-test-results
        uses: actions/upload-artifact@v4
        with:
          name: us-limit-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report

  fe-bot-alert:
    runs-on: ubuntu-latest
    needs:
      [
        fe-trade-eu,
        fe-trade-us,
        fe-trade-sg,
        fe-limit-us,
        fe-limit-eu,
      ]
    if: failure() && github.run_attempt == 2 && (needs.fe-trade-eu.outputs.unexpected > 1 || needs.fe-trade-us.outputs.unexpected > 1 || needs.fe-trade-sg.outputs.unexpected > 1 || needs.fe-limit-eu.outputs.unexpected > 1 || needs.fe-limit-us.outputs.unexpected > 1)
    # Send alert only if something failed and unexpected failures are more than 1
    steps:
      - name: Install Datadog CI
        run: |
          echo "📦 Installing Datadog CI..."
          curl -L --fail "https://github.com/DataDog/datadog-ci/releases/download/v4.1.2/datadog-ci_linux-x64" --output "/usr/local/bin/datadog-ci"
          chmod +x /usr/local/bin/datadog-ci
          echo "✅ Datadog CI installed"

      - name: Verify Datadog CI Installation
        run: |
          echo "🔍 Verifying Datadog CI installation..."
          datadog-ci version
          echo "✅ Datadog CI is ready to use"

      - name: Send Datadog alert if test fails
        env:
          DD_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DD_APP_KEY: ${{ secrets.DATADOG_APPLICATION_KEY }}
          DD_SITE: ${{ secrets.DATADOG_SITE }}
        run: |
          echo "🔍 Sending critical failure metrics to Datadog..."

          # Add custom tag to mark this as a critical failure (2nd attempt with multiple failures)
          datadog-ci tag --level pipeline --tags "critical_failure:true" --tags "dd_gh_run_attempt:${{ github.run_attempt }}"

          # Add tags for unexpected failure counts by region
          datadog-ci tag --level pipeline \
            --tags "fe_trade_eu_unexpected:${{ needs.fe-trade-eu.outputs.unexpected }}" \
            --tags "fe_trade_us_unexpected:${{ needs.fe-trade-us.outputs.unexpected }}" \
            --tags "fe_trade_sg_unexpected:${{ needs.fe-trade-sg.outputs.unexpected }}" \
            --tags "fe_limit_eu_unexpected:${{ needs.fe-limit-eu.outputs.unexpected }}" \
            --tags "fe_limit_us_unexpected:${{ needs.fe-limit-us.outputs.unexpected }}"

          echo "✅ Metrics sent to Datadog successfully"

  delete-deployments:
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        fe-trade-eu,
        fe-trade-us,
        fe-trade-sg,
        fe-bot-alert,
        fe-limit-us,
        fe-limit-eu,
      ]
    steps:
      - name: Delete Previous deployments
        uses: actions/github-script@v7
        with:
          debug: true
          script: |
            const deployments = await github.rest.repos.listDeployments({
               owner: context.repo.owner,
               repo: context.repo.repo,
               sha: context.sha
             });
             await Promise.all(
               deployments.data.map(async (deployment) => {
                 await github.rest.repos.createDeploymentStatus({ 
                   owner: context.repo.owner, 
                   repo: context.repo.repo, 
                   deployment_id: deployment.id, 
                   state: 'inactive' 
                 });
                 return github.rest.repos.deleteDeployment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id
                });
               })
             );
