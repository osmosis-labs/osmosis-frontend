            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.E2E_SLACK_WEBHOOK_BALANCE_ALERTS }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      - name: Trigger automatic topup
        if: steps.balance-details.outputs.outcome == 'warn' || steps.balance-details.outputs.outcome == 'fail'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PENDING=$(gh run list --workflow "E2E: Topup Test Accounts" --limit 50 --json status --jq '[.[] | select(.status == "queued" or .status == "in_progress")] | length')
          if [ "$PENDING" -gt 0 ]; then
            echo "Topup workflow already queued/in-progress — skipping dispatch."
          else
            gh workflow run "E2E: Topup Test Accounts" \
              --ref stage \
              -f dry_run=false \
              -f topup_multiplier=3.0 \
              -f reserve_osmo=5 \
              -f reserve_usdc=100
            echo "Topup workflow dispatched (balance outcome: ${{ steps.balance-details.outputs.outcome }})."
          fi

  # -------------------------------------------------------------------------
  # Region test jobs.
  #
  # Each `needs:` its region's preflight and skips when preflight reports
  # a critical (`fail`) balance shortage. Per-job balance checks have moved
  # to the preflight; these jobs only run the playwright tests.
  # -------------------------------------------------------------------------

  fe-swap-us:
    timeout-minutes: 10
    name: prod-fe-swap-us
    runs-on: macos-14
    needs: preflight-us
    if: needs.preflight-us.outputs.outcome != 'fail'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-22.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-22.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Run Swap tests in US
        env:
          BASE_URL: "https://app.osmosis.zone"
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_US }}
          # Linux-headless mode (PR #4319) — disabled in favour of macos-14 above due to
          # Keplr extension popup flakiness in headless Chromium on Linux. To retry the
          # cheaper Linux runner, switch `runs-on:` to `ubuntu-latest` and uncomment:
          # HEADLESS: "true"
        run: |
          cd packages/e2e
          npx playwright test monitoring.swap
      - name: upload test results
        if: failure()
        id: e2e-test-results
        uses: actions/upload-artifact@v4
        with:
          name: us-swap-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report

  fe-swap-eu:
    timeout-minutes: 15
    name: prod-fe-swap-eu
    runs-on: macos-14
    needs: preflight-eu
    if: needs.preflight-eu.outputs.outcome != 'fail'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-22.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-22.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Run Swap tests in EU
        env:
          BASE_URL: "https://app.osmosis.zone"
          TEST_PROXY: "http://138.68.112.16:8888"
          TEST_PROXY_USERNAME: ${{ secrets.TEST_PROXY_USERNAME }}
          TEST_PROXY_PASSWORD: ${{ secrets.TEST_PROXY_PASSWORD }}
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_EU }}
          USE_TEST_PROXY: "use"
          # Linux-headless mode (PR #4319) — disabled in favour of macos-14 above due to
          # Keplr extension popup flakiness in headless Chromium on Linux. To retry the
          # cheaper Linux runner, switch `runs-on:` to `ubuntu-latest` and uncomment:
          # HEADLESS: "true"
        run: |
          cd packages/e2e
          npx playwright test monitoring.swap
      - name: upload test results
        if: failure()
        id: e2e-test-results
        uses: actions/upload-artifact@v4
        with:
          name: eu-swap-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report

  fe-swap-sg:
    timeout-minutes: 15
    name: prod-fe-swap-sg
    runs-on: macos-14
    needs: preflight-sg
    if: needs.preflight-sg.outputs.outcome != 'fail'
    steps:
      - name: Echo IP
        run: curl -L "https://ipinfo.io" -s
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-22.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-22.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Run Swap tests in SG
        env:
          BASE_URL: "https://app.osmosis.zone"
          TEST_PROXY: "http://139.59.218.19:8888"
          TEST_PROXY_USERNAME: ${{ secrets.TEST_PROXY_USERNAME }}
          TEST_PROXY_PASSWORD: ${{ secrets.TEST_PROXY_PASSWORD }}
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_SG }}
          USE_TEST_PROXY: "use"
          # Linux-headless mode (PR #4319) — disabled in favour of macos-14 above due to
          # Keplr extension popup flakiness in headless Chromium on Linux. To retry the
          # cheaper Linux runner, switch `runs-on:` to `ubuntu-latest` and uncomment:
          # HEADLESS: "true"
        run: |
          cd packages/e2e
          npx playwright test monitoring.swap
      - name: upload test results
        if: failure()
        id: e2e-test-results
        uses: actions/upload-artifact@v4
        with:
          name: sg-swap-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report

  fe-trade-eu:
    timeout-minutes: 20
    needs: [preflight-eu, fe-swap-eu]
    if: always() && needs.preflight-eu.outputs.outcome != 'fail'
    name: prod-fe-trade-eu
    runs-on: macos-14
    outputs:
      unexpected: ${{ steps.set-output.outputs.unexpected }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-22.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-22.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Run Trade tests in EU
        env:
          BASE_URL: "https://app.osmosis.zone"
          TEST_PROXY: "http://138.68.112.16:8888"
          TEST_PROXY_USERNAME: ${{ secrets.TEST_PROXY_USERNAME }}
          TEST_PROXY_PASSWORD: ${{ secrets.TEST_PROXY_PASSWORD }}
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_EU }}
          USE_TEST_PROXY: "use"
          # Linux-headless mode (PR #4319) — disabled in favour of macos-14 above due to
