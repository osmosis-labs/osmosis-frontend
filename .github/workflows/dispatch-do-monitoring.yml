name: Dispatch DO Monitoring

# Triggers the DO infrastructure monitoring workflow on the feature branch
# every 20 minutes. This allows scheduled monitoring without merging to stage.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: # Allow manual triggers for testing

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger DO monitoring on feature branch
        uses: actions/github-script@v7
        with:
          script: |
            const workflowFile = 'monitoring-do-e2e-tests.yml';
            console.log(`Verifying workflow '${workflowFile}' exists on branch 'jason/do-endpoints-e2e'...`);
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const exists = workflows.data.workflows.some(wf => wf.path && wf.path.endsWith('/' + workflowFile));
            if (!exists) {
              core.setFailed(`Workflow file '${workflowFile}' does not exist in this repository. Cannot dispatch to branch 'jason/do-endpoints-e2e'.`);
              return;
            }

            console.log(`Dispatching DO monitoring workflow '${workflowFile}' to jason/do-endpoints-e2e branch...`);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowFile,
              ref: 'jason/do-endpoints-e2e'
            });
            console.log('Workflow dispatched successfully');
