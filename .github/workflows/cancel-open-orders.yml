          key: ${{ runner.OS }}-22.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-22.x-
      - name: Install dependencies
        run: yarn --cwd packages/e2e install --frozen-lockfile
      - name: Cancel open limit orders
        env:
          PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY_1 }}
          ACCOUNT_LABEL: "Monitoring SG"
        run: npx tsx packages/e2e/scripts/cancel-all-orders.ts
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cancel-orders-monitoring-sg-logs
          path: packages/e2e/playwright-report

  cancel-limit-orders-monitoring-eu:
    name: Cancel orders — Monitoring EU
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
