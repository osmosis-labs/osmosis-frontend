name: Production frontend E2E tests

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  wait-for-deployment:
    runs-on: ubuntu-latest
    outputs:
      environment_url: ${{steps.vercel.outputs.environment_url}}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - id: vercel
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT: ${{ secrets.VERCEL_PROJECT }}
          VERCEL_TARGET: "production"
        run: |
          echo "$BRANCH_NAME"
          cd .github && python await_deployment.py
      - name: Echo GITHUB_OUTPUT environment_url
        env:
          environment_url: ${{ steps.vercel.outputs.environment_url }}
        run: echo "$environment_url"

  check-balances:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            packages/e2e
          ref: master
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          package-manager-cache: false
          node-version: 22.x
      - name: Install dependencies
        run: yarn --cwd packages/e2e install --frozen-lockfile
      - name: Check account balances
        id: balance-check
        continue-on-error: true
        env:
          PRIVATE_KEY: ${{ secrets.E2E_PRIVATE_KEY_PREVIEW }}
          ACCOUNT_LABEL: "E2E Test Account"
        run: yarn --cwd packages/e2e check-balances
      - name: Extract balance details
        id: balance-details
        if: steps.balance-check.outcome == 'failure'
        continue-on-error: true
        run: |
          if [ -f packages/e2e/balance-report.json ]; then
            echo "is_balance_issue=true" >> "$GITHUB_OUTPUT"
            SUMMARY=$(jq -r '[.details[] | ltrimstr("  ")] | join("\\n")' packages/e2e/balance-report.json)
            ADDRESS=$(jq -r '.address // ""' packages/e2e/balance-report.json)
            OUTCOME=$(jq -r '.outcome // "warn"' packages/e2e/balance-report.json)
            echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"
            echo "address=${ADDRESS}" >> "$GITHUB_OUTPUT"
            echo "outcome=${OUTCOME}" >> "$GITHUB_OUTPUT"
            echo "is_balance_issue=true" >> "$GITHUB_OUTPUT"
          else
            echo "summary=Balance check script crashed (not a balance issue)." >> "$GITHUB_OUTPUT"
            echo "outcome=error" >> "$GITHUB_OUTPUT"
            echo "is_balance_issue=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Send low-balance Slack alert
        if: steps.balance-check.outcome == 'failure' && steps.balance-details.outputs.is_balance_issue == 'true'
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ steps.balance-details.outputs.outcome == 'fail' && '🚨 E2E Critical Balance Alert' || '⚠️ E2E Low Balance Warning' }}",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "${{ steps.balance-details.outputs.outcome == 'fail' && '🚨 E2E Critical Balance Alert' || '⚠️ E2E Low Balance Warning' }}", "emoji": true }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Account:* E2E Preview Test Account\n*Address:* ${{ steps.balance-details.outputs.address }}\n*Shortages:*\n${{ steps.balance-details.outputs.summary }}\n*Workflow:* prod-frontend-e2e-tests / check-balances\n*Details:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.E2E_SLACK_WEBHOOK_BALANCE_ALERTS }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      - name: Trigger automatic topup
        if: steps.balance-check.outcome == 'failure'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f packages/e2e/balance-report.json ]; then
            OUTCOME=$(jq -r '.outcome // ""' packages/e2e/balance-report.json)
            if [ "$OUTCOME" = "warn" ] || [ "$OUTCOME" = "fail" ]; then
              # Dedup guard (Phase A / MTN-97): skip if a topup is already in
              # flight, OR a real (non-dry-run) successful topup was *created*
              # (`createdAt`, i.e. dispatched/queued) within the ~45 min cooldown.
              # The window is keyed off createdAt (≈ dispatch time), not the
              # completion time, since the intent is to rate-limit how often we
              # dispatch. 45 min is deliberately below the 60 min monitoring cron
              # so a still-low account is still refilled on the next hourly tick;
              # the window only collapses same-tick and cross-workflow bursts.
              # Failed runs do NOT count (so a bad topup can be retried
              # immediately); dry runs do NOT count (no funds move). Note this is
              # a best-effort, non-atomic check — two dispatchers firing in the
              # same instant can still both dispatch.
              COOLDOWN_SECONDS=2700
              RECENT=$(gh run list --workflow "E2E: Topup Test Accounts" --limit 50 \
                --json status,conclusion,displayTitle,createdAt \
                --jq "[.[]
                  | select((.displayTitle | startswith(\"Dry run\")) | not)
                  | select(
                      .status == \"queued\" or .status == \"in_progress\"
                      or (.conclusion == \"success\" and ((now - (.createdAt | fromdateiso8601)) < $COOLDOWN_SECONDS))
                    )] | length" || echo "")
              # Fail open (MTN-110): if the gh/jq lookup errored, RECENT is
              # empty/non-numeric — treat it as "nothing recent" and dispatch
              # rather than silently skip. A duplicate topup is harmless (the
              # script re-checks balances and only sends deficits); a skipped
              # dispatch is the starvation bug this guard exists to prevent.
              if ! [[ "$RECENT" =~ ^[0-9]+$ ]]; then
                echo "Topup cooldown lookup failed (gh/jq) — proceeding to dispatch."
                RECENT=0
              fi
              if [ "$RECENT" -gt 0 ]; then
                echo "Recent successful or in-flight topup within cooldown — skipping dispatch."
              else
                gh workflow run "E2E: Topup Test Accounts" \
                  --ref stage \
                  -f dry_run=false \
                  -f topup_multiplier=1.5 \
                  -f reserve_osmo=5 \
                  -f reserve_usdc=500
                echo "Topup workflow dispatched (balance outcome: $OUTCOME)."
              fi
            else
              echo "Skipping topup — balance outcome: $OUTCOME"
            fi
          else
            echo "Skipping topup — no balance report found."
          fi
      - name: Fail if balance critically low
        if: always() && steps.balance-check.outcome == 'failure'
        run: |
          if [ -f packages/e2e/balance-report.json ]; then
            OUTCOME=$(jq -r '.outcome' packages/e2e/balance-report.json)
            if [ "$OUTCOME" = "fail" ]; then
              echo "Critical balance shortage — blocking test run."
              exit 1
            fi
            echo "Low balance warning — proceeding with tests."
          else
            echo "Balance check failed but no report — proceeding with tests."
          fi

  prod-e2e-tests:
    runs-on: macos-14
    timeout-minutes: 20
    needs: [wait-for-deployment, check-balances]
    environment:
      name: prod_swap_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            packages/e2e
          ref: master
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          package-manager-cache: false
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-20.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-20.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Run Swap Pair tests on Master
        env:
          BASE_URL: "https://app.osmosis.zone"
          PRIVATE_KEY: ${{ secrets.E2E_PRIVATE_KEY_PREVIEW }}
          # Linux-headless mode (PR #4319) — disabled in favour of macos-14 above due to
          # Keplr extension popup flakiness in headless Chromium on Linux. To retry the
          # cheaper Linux runner, switch `runs-on:` to `ubuntu-latest` and uncomment:
          # HEADLESS: "true"
        run: |
          cd packages/e2e
          npx playwright test transactions portfolio swap.osmo.wallet
      - name: upload test results
        if: always()
        id: e2e-test-results
        uses: actions/upload-artifact@v6
        with:
          name: prod-e2e-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report
      - name: Send Slack alert if test fails
        id: slack
        if: failure() && github.run_attempt == 1
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 FE E2E Tests Failure Alert 🚨",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "FE E2E Tests Failure"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Environment:* production\n*App URL:* https://app.osmosis.zone"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Click here to view the run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.E2E_SLACK_WEBHOOK_MONITOR_CHAIN_LOW }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  prod-pools-and-select-pair-tests:
    timeout-minutes: 10
    needs: wait-for-deployment
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          package-manager-cache: false
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-20.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-20.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Run Pools tests
        env:
          BASE_URL: "https://app.osmosis.zone"
        run: |
          cd packages/e2e
          npx playwright test pools select
      - name: upload pools test results
        if: failure()
        id: pools-test-results
        uses: actions/upload-artifact@v6
        with:
          name: prod-pools-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report
