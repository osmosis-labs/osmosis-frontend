name: Production frontend E2E tests

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  wait-for-deployment:
    runs-on: ubuntu-latest
    outputs:
      environment_url: ${{steps.vercel.outputs.environment_url}}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - id: vercel
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT: ${{ secrets.VERCEL_PROJECT }}
          VERCEL_TARGET: "production"
        run: |
          echo "$BRANCH_NAME"
          cd .github && python await_deployment.py
      - name: Echo GITHUB_OUTPUT environment_url
        env:
          environment_url: ${{ steps.vercel.outputs.environment_url }}
        run: echo "$environment_url"

  prod-e2e-tests:
    runs-on: macos-14
    timeout-minutes: 20
    needs: wait-for-deployment
    environment:
      name: prod_swap_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
          ref: master
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-20.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-20.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Check account balances
        id: balance-check
        continue-on-error: true
        env:
          PRIVATE_KEY: ${{ secrets.E2E_PRIVATE_KEY_PREVIEW }}
          ACCOUNT_LABEL: "E2E Test Account"
        run: yarn --cwd packages/e2e check-balances
      - name: Extract balance details
        id: balance-details
        if: steps.balance-check.outcome == 'failure'
        continue-on-error: true
        run: |
          if [ -f packages/e2e/balance-report.json ]; then
            SUMMARY=$(jq -r '[.details[] | ltrimstr("  ")] | join("\\n")' packages/e2e/balance-report.json)
            ADDRESS=$(jq -r '.address // ""' packages/e2e/balance-report.json)
            OUTCOME=$(jq -r '.outcome // "warn"' packages/e2e/balance-report.json)
            echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"
            echo "address=${ADDRESS}" >> "$GITHUB_OUTPUT"
            echo "outcome=${OUTCOME}" >> "$GITHUB_OUTPUT"
          else
            echo "summary=Balance report not available." >> "$GITHUB_OUTPUT"
            echo "outcome=warn" >> "$GITHUB_OUTPUT"
          fi
      - name: Send low-balance Slack alert
        if: steps.balance-check.outcome == 'failure'
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ steps.balance-details.outputs.outcome == 'fail' && '🚨 E2E Critical Balance Alert' || '⚠️ E2E Low Balance Warning' }}",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "${{ steps.balance-details.outputs.outcome == 'fail' && '🚨 E2E Critical Balance Alert' || '⚠️ E2E Low Balance Warning' }}", "emoji": true }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Account:* E2E Preview Test Account\n*Address:* ${{ steps.balance-details.outputs.address }}\n*Shortages:*\n${{ steps.balance-details.outputs.summary }}\n*Workflow:* prod-frontend-e2e-tests / prod-e2e-tests\n*Details:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.E2E_SLACK_WEBHOOK_BALANCE_ALERTS }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      - name: Fail if balance critically low
        if: always() && steps.balance-check.outcome == 'failure'
        run: |
          if [ -f packages/e2e/balance-report.json ]; then
            OUTCOME=$(jq -r '.outcome' packages/e2e/balance-report.json)
            if [ "$OUTCOME" = "fail" ]; then
              echo "Critical balance shortage — blocking test run."
              exit 1
            fi
            echo "Low balance warning — proceeding with tests."
          else
            echo "Balance check failed but no report — proceeding with tests."
          fi
      - name: Run Swap Pair tests on Master
        env:
          BASE_URL: "https://app.osmosis.zone"
          PRIVATE_KEY: ${{ secrets.E2E_PRIVATE_KEY_PREVIEW }}
        run: |
          cd packages/e2e
          npx playwright test transactions portfolio swap.osmo.wallet
      - name: upload test results
        if: always()
        id: e2e-test-results
        uses: actions/upload-artifact@v4
        with:
          name: prod-e2e-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report
      - name: Send Slack alert if test fails
        id: slack
        if: failure() && github.run_attempt == 1
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 FE E2E Tests Failure Alert 🚨",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "FE E2E Tests Failure"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Environment:* production\n*App URL:* https://app.osmosis.zone"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Click here to view the run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.E2E_SLACK_WEBHOOK_MONITOR_CHAIN_LOW }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  prod-pools-and-select-pair-tests:
    timeout-minutes: 10
    needs: wait-for-deployment
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            packages/e2e
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.OS }}-20.x-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-20.x-
      - name: Install Playwright
        run: |
          yarn --cwd packages/e2e install --frozen-lockfile && npx playwright install --with-deps chromium
      - name: Run Pools tests
        env:
          BASE_URL: "https://app.osmosis.zone"
        run: |
          cd packages/e2e
          npx playwright test pools select
      - name: upload pools test results
        if: failure()
        id: pools-test-results
        uses: actions/upload-artifact@v4
        with:
          name: prod-pools-test-results-${{ github.run_id }}
          path: packages/e2e/playwright-report
